name: Release and Deploy Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (example: v1.2.3)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide tag/version
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.version }}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "asset=acme_inc_bundle-$TAG.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build bundle asset
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "${{ steps.vars.outputs.asset }}" /
          ls -lah "${{ steps.vars.outputs.asset }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            ${{ steps.vars.outputs.asset }}
