name: Release Bundle (auto tag)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type: patch | minor | major"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Optional explicit version WITHOUT leading v (e.g. 1.2.3). If set, bump is ignored."
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          # If user provided an explicit version, use it.
          if [[ -n "${{ inputs.version }}" ]]; then
            TAG="v${{ inputs.version }}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find latest v* tag; if none, start at v0.1.0
          if git tag --list "v*" | grep -q .; then
            LATEST="$(git describe --tags --match "v*" --abbrev=0)"
          else
            LATEST="v0.1.0"
          fi

          # Parse vMAJOR.MINOR.PATCH
          v="${LATEST#v}"
          IFS='.' read -r MA MI PA <<< "$v"
          MA="${MA:-0}"
          MI="${MI:-0}"
          PA="${PA:-0}"

          case "${{ inputs.bump }}" in
            major)
              MA=$((MA + 1)); MI=0; PA=0
              ;;
            minor)
              MI=$((MI + 1)); PA=0
              ;;
            patch|*)
              PA=$((PA + 1))
              ;;
          esac

          TAG="v${MA}.${MI}.${PA}"
          echo "Latest tag: $LATEST"
          echo "Next tag:   $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fail fast if tag already exists
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag already exists: $TAG"
            exit 1
          fi

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Build release asset (tracked repo contents)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          ASSET_NAME="acme_inc_bundle-${TAG}.tar.gz"

          # Packs the repository contents from HEAD (tracked files only)
          git archive --format=tar.gz -o "$ASSET_NAME" HEAD

          ls -lah "$ASSET_NAME"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ env.ASSET_NAME }}
